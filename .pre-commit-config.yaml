repos:
  - repo: https://github.com/pycqa/flake8
    rev: 6.1.0  # Check for latest stable version: https://github.com/pycqa/flake8/releases
    hooks:
      - id: flake8

repos:
  - repo: https://github.com/psf/black
    rev: 24.3.0
    hooks:
      - id: black

  - repo: https://github.com/PyCQA/isort
    rev: 5.13.2
    hooks:
      - id: isort